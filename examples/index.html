<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>EpochEngine.JS v0.1 - Demo</title>
  <style>
    body {
      font-family: system-ui;
      background: #121212;
      color: #fff;
      padding: 20px;
    }

    h1 {
      color: #5bc0be;
    }

    pre {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      color: #d4d4d4;
    }

    .success {
      color: #4ade80;
    }

    .warning {
      color: #facc15;
    }

    button {
      background: #5bc0be;
      color: #000;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #3a9c9a;
    }
  </style>
</head>

<body>
  <h1>🪐 EpochEngine.JS - Consola Interactiva</h1>
  <p>Abre las herramientas de desarrollador (F12) o mira la salida a continuación para ver cómo el Motor Temporal
    procesa los Sucesos de prueba.</p>

  <button id="run-demo">Ejecutar Simulación Narrativa</button>

  <h2>Salida del Motor:</h2>
  <pre id="output">Esperando ejecución...</pre>

  <script type="module" src="./main.js"></script>
</body>

</html>
