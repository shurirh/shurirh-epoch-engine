<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epoch Engine v0.3 - Demo</title>
    <link rel="stylesheet" href="../src/ui/styles.css">
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        #timeline-container { width: 100%; height: 500px; margin-top: 20px; }
        textarea { width: 100%; height: 150px; font-family: monospace; }
        .controls { background: #eee; padding: 15px; border-radius: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Epoch Engine v0.3 — Demo</h1>
    <p>Restructuring + JSON I/O + SVG Renderer + CSV Adapter</p>

    <div class="controls">
        <h3>Input CSV Data</h3>
        <textarea id="csv-input">id,title,description,start,end,tags,meta,precedes,causes,branches,merges,loops
e1,First Landing,Arrival at Mars,2032-04-10,,space|mars,{"location":"Mars"},e2,,,,
e2,First walk,First steps on red soil,2032-04-10,,space|mars,{"location":"Mars"},,e1,,,
e3,Temporal divergence,,2032-04-11,,timeline,{"reason":"paradox"},,,e4,,
e4,Alternate future,,2032-04-11,,altfuture,{},,,,e2|e3,</textarea>
        <br><br>
        <button id="render-btn">Process & Render</button>
    </div>

    <div id="timeline-container"></div>

    <script type="module">
        import { EpochEngine } from '../src/index.js';
        import { Renderer } from '../src/ui/renderer.js';
        import { csvToJSON } from '../src/utils/csvAdapter.js';

        const btn = document.getElementById('render-btn');
        const container = document.getElementById('timeline-container');
        const textarea = document.getElementById('csv-input');

        const engine = new EpochEngine();
        const renderer = new Renderer();

        btn.addEventListener('click', () => {
            const csvData = textarea.value;
            
            // 1. CSV to JSON
            const jsonData = csvToJSON(csvData);
            console.log('JSON Data:', jsonData);

            // 2. Import into Engine
            const report = engine.importJSON(jsonData);
            console.log('Import Report:', report);

            // 3. Render
            renderer.renderGraph(engine, container);
        });

        // Initial render
        btn.click();
    </script>
</body>
</html>
